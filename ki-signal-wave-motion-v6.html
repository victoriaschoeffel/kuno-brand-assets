    :root {
      --paper: #F4EFE6;
      --ink: #1C1A17;
      --quiet: #E6DFD2;
      --stone: #7A736A;
      --nickel: #A7A19A;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
    }
    main {
      width: min(1120px, calc(100vw - 48px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
    }
    header, footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      color: var(--stone);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 1.8px;
      text-transform: uppercase;
    }
    .wordmark {
      color: var(--ink);
      font-size: 28px;
      font-weight: 820;
      letter-spacing: 5px;
    }
    .stage {
      min-height: min(720px, calc(100vh - 160px));
      border-radius: 28px;
      background: var(--quiet);
      display: grid;
      grid-template-columns: minmax(300px, .9fr) minmax(360px, 1fr);
      align-items: center;
      gap: 56px;
      padding: clamp(32px, 6vw, 76px);
    }
    h1 {
      margin: 0;
      max-width: 560px;
      font-size: clamp(46px, 6.4vw, 82px);
      line-height: .98;
      font-weight: 780;
      letter-spacing: 0;
    }
    p {
      margin: 22px 0 0;
      max-width: 440px;
      font-size: 17px;
      line-height: 1.45;
      color: var(--stone);
      font-weight: 500;
    }
    .demo-wrap { display: grid; justify-items: center; gap: 20px; }
    .demo {
      aspect-ratio: 1;
      width: min(390px, 100%);
      border-radius: 76px;
      background: var(--ink);
      position: relative;
      overflow: hidden;
      box-shadow: 0 34px 70px rgba(28, 26, 23, .14);
    }
    .demo svg { display: block; width: 100%; height: 100%; }
    .bar { transform-box: fill-box; transform-origin: center; will-change: transform, opacity; }
    .readout {
      min-height: 22px;
      color: var(--stone);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: .4px;
      text-align: center;
    }
    @media (max-width: 760px) {
      main { width: calc(100vw - 32px); gap: 20px; }
      header, footer { flex-direction: column; align-items: flex-start; gap: 8px; }
      .stage { grid-template-columns: 1fr; gap: 44px; padding: 32px 24px 56px; }
      .demo { width: min(310px, 100%); border-radius: 58px; }
    }
  </style>

  <script>
    const motion = JSON.parse(document.getElementById('motion-data').textContent);
    const svg = document.getElementById('motion-mark');
    const readout = document.getElementById('readout');
    const ns = 'http://www.w3.org/2000/svg';
    const palette = motion.palette;
    const rects = new Map();
    let barLayer;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function setupSvg() {
      svg.innerHTML = '<defs><clipPath id="icon-clip"><rect width="220" height="220" rx="44"></rect></clipPath></defs><rect width="220" height="220" rx="44" fill="' + palette.ink + '"></rect><g id="bar-layer" clip-path="url(#icon-clip)"></g>';
      barLayer = svg.querySelector('#bar-layer');
    }
    function makeRect(id, fillKey) {
      const rect = document.createElementNS(ns, 'rect');
      rect.classList.add('bar');
      rect.dataset.id = id;
      rect.setAttribute('fill', palette[fillKey]);
      barLayer.appendChild(rect);
      rects.set(id, rect);
    }
    setupSvg();
    motion.bars.forEach((bar) => makeRect(bar.id, bar.fill));
    function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function currentPair(progress) {
      const frames = motion.keyframes;
      for (let i = 0; i < frames.length - 1; i += 1) {
        if (progress >= frames[i].t && progress <= frames[i + 1].t) {
          const span = frames[i + 1].t - frames[i].t;
          return { from: frames[i], to: frames[i + 1], mix: span === 0 ? 0 : (progress - frames[i].t) / span };
        }
      }
      return { from: frames[frames.length - 1], to: frames[frames.length - 1], mix: 0 };
    }
    function draw(progress) {
      const pair = currentPair(progress);
      const amount = ease(pair.mix);
      motion.bars.forEach((bar) => {
        const from = pair.from.bars[bar.id];
        const to = pair.to.bars[bar.id];
        const x = lerp(from.x, to.x, amount);
        const y = lerp(from.y, to.y, amount);
        const w = lerp(from.w, to.w, amount);
        const h = lerp(from.h, to.h, amount);
        const r = lerp(from.r, to.r, amount);
        const opacity = lerp(from.opacity, to.opacity, amount);
        const cx = x + w / 2;
        const cy = y + h / 2;
        const rect = rects.get(bar.id);
        rect.setAttribute('x', x.toFixed(2));
        rect.setAttribute('y', y.toFixed(2));
        rect.setAttribute('width', w.toFixed(2));
        rect.setAttribute('height', h.toFixed(2));
        rect.setAttribute('rx', (w / 2).toFixed(2));
        rect.setAttribute('opacity', opacity.toFixed(3));
        rect.setAttribute('transform', 'rotate(' + r.toFixed(2) + ' ' + cx.toFixed(2) + ' ' + cy.toFixed(2) + ')');
      });
      readout.textContent = pair.to.label;
    }
    function tick(now) {
      if (!reduceMotion) draw((now % motion.timing.durationMs) / motion.timing.durationMs);
      requestAnimationFrame(tick);
    }
    draw(0);
    requestAnimationFrame(tick);
  </script>
