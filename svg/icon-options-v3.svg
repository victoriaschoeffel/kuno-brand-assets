<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <rect width="1200" height="700" fill="#F4EFE6"/>
  <text x="40" y="44" font-family="system-ui,sans-serif" font-size="14" font-weight="500" letter-spacing="2" fill="#7A736A">KUNO · ICON DIRECTIONS · v3 (KU/NO all-caps + soundwave fusions + wax seal variants)</text>

  <!-- N: Stacked KU/NO solid -->
  <g transform="translate(40, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">N — STACKED KU/NO SOLID</text>
    <rect x="0" y="40" width="160" height="160" rx="32" fill="#1C1A17"/>
    <text x="80" y="116" font-family="system-ui,sans-serif" font-size="54" font-weight="800" fill="#F4EFE6" text-anchor="middle" letter-spacing="5">KU</text>
    <text x="80" y="180" font-family="system-ui,sans-serif" font-size="54" font-weight="800" fill="#F4EFE6" text-anchor="middle" letter-spacing="5">NO</text>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">All-caps stamp. Bauhaus-monumental.</text>
  </g>

  <!-- O: KU/NO with gold rule -->
  <g transform="translate(240, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">O — KU/NO WITH GOLD RULE</text>
    <rect x="0" y="40" width="160" height="160" rx="32" fill="#FFFFFF" stroke="#1C1A17" stroke-width="3"/>
    <text x="80" y="106" font-family="system-ui,sans-serif" font-size="46" font-weight="800" fill="#1C1A17" text-anchor="middle" letter-spacing="3">KU</text>
    <line x1="58" y1="120" x2="102" y2="120" stroke="#B8945A" stroke-width="2"/>
    <text x="80" y="172" font-family="system-ui,sans-serif" font-size="46" font-weight="800" fill="#1C1A17" text-anchor="middle" letter-spacing="3">NO</text>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">Debossed paper + Warm Gold separator.</text>
  </g>

  <!-- P: Wax seal KU/NO -->
  <g transform="translate(440, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">P — WAX SEAL · KU/NO</text>
    <circle cx="80" cy="120" r="78" fill="#5A2528"/>
    <circle cx="80" cy="120" r="60" fill="none" stroke="#B8945A" stroke-width="1.5"/>
    <text x="80" y="118" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#B8945A" text-anchor="middle" letter-spacing="3">KU</text>
    <text x="80" y="158" font-family="system-ui,sans-serif" font-size="38" font-weight="800" fill="#B8945A" text-anchor="middle" letter-spacing="3">NO</text>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">Heidelberg-edition seal with KU/NO.</text>
  </g>

  <!-- Q: Wax seal with soundwaves -->
  <g transform="translate(640, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">Q — WAX SEAL WITH SOUNDWAVES</text>
    <circle cx="80" cy="120" r="78" fill="#1C1A17"/>
    <circle cx="80" cy="120" r="60" fill="none" stroke="#B8945A" stroke-width="2"/>
    <text x="80" y="142" font-family="system-ui,sans-serif" font-size="76" font-weight="800" fill="#B8945A" text-anchor="middle">K</text>
    <line x1="44" y1="120" x2="28" y2="120" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="124" y1="120" x2="140" y2="120" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="100" x2="28" y2="100" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="128" y1="100" x2="140" y2="100" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="140" x2="28" y2="140" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="128" y1="140" x2="140" y2="140" stroke="#B8945A" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">Black seal + sound rays L/R from K.</text>
  </g>

  <!-- R: K through soundwave -->
  <g transform="translate(840, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">R — K THROUGH SOUNDWAVE</text>
    <rect x="0" y="40" width="160" height="160" rx="32" fill="#1C1A17"/>
    <line x1="20" y1="120" x2="40" y2="120" stroke="#B8945A" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="120" x2="140" y2="120" stroke="#B8945A" stroke-width="4" stroke-linecap="round"/>
    <text x="80" y="160" font-family="system-ui,sans-serif" font-size="100" font-weight="800" fill="#F4EFE6" text-anchor="middle">K</text>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">K resting on a soundwave bar.</text>
  </g>

  <!-- S: Button with sound rings -->
  <g transform="translate(1040, 80)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">S — BUTTON WITH SOUND RINGS</text>
    <circle cx="80" cy="120" r="78" fill="#1C1A17"/>
    <circle cx="80" cy="120" r="58" fill="none" stroke="#B8945A" stroke-width="1.5" stroke-dasharray="3 4"/>
    <circle cx="80" cy="120" r="38" fill="none" stroke="#B8945A" stroke-width="1.5" stroke-dasharray="3 4"/>
    <circle cx="80" cy="120" r="18" fill="#B8945A"/>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">Kuno button + concentric sound rings.</text>
  </g>

  <!-- T: Soundwave-formed K -->
  <g transform="translate(40, 380)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">T — SOUNDWAVE-FORMED K</text>
    <rect x="0" y="40" width="160" height="160" rx="32" fill="#F4EFE6" stroke="#1C1A17" stroke-width="3"/>
    <line x1="50" y1="60" x2="50" y2="180" stroke="#1C1A17" stroke-width="11" stroke-linecap="round"/>
    <line x1="60" y1="120" x2="100" y2="74" stroke="#B8945A" stroke-width="8" stroke-linecap="round"/>
    <line x1="60" y1="120" x2="100" y2="166" stroke="#B8945A" stroke-width="8" stroke-linecap="round"/>
    <line x1="110" y1="106" x2="110" y2="134" stroke="#B8945A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="122" y1="100" x2="122" y2="140" stroke="#B8945A" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="134" y1="106" x2="134" y2="134" stroke="#B8945A" stroke-width="3.5" stroke-linecap="round"/>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">K's arms become sound rays.</text>
  </g>

  <!-- U: Burgundy KU/NO seal -->
  <g transform="translate(240, 380)">
    <text x="0" y="20" font-family="system-ui,sans-serif" font-size="11" font-weight="500" letter-spacing="1.5" fill="#7A736A">U — BURGUNDY KU/NO (HEIDELBERG)</text>
    <rect x="0" y="40" width="160" height="160" rx="32" fill="#5A2528"/>
    <text x="80" y="116" font-family="system-ui,sans-serif" font-size="54" font-weight="800" fill="#B8945A" text-anchor="middle" letter-spacing="5">KU</text>
    <text x="80" y="180" font-family="system-ui,sans-serif" font-size="54" font-weight="800" fill="#B8945A" text-anchor="middle" letter-spacing="5">NO</text>
    <text x="0" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#4A453F">Heidelberg-only colorway. Edition seal.</text>
  </g>

  <!-- Footer recommendation -->
  <g transform="translate(440, 380)">
    <text x="0" y="0" font-family="system-ui,sans-serif" font-size="13" font-weight="500" letter-spacing="1.5" fill="#7A736A">RECOMMENDATIONS — PICK A LANE</text>
    <text x="0" y="30" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">**Strongest stacked-wordmark direction:** O (KU/NO with gold rule) — most "fashion-tech," debossable into leather.</text>
    <text x="0" y="56" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">**Strongest soundwave fusion:** S (Button with sound rings) — combines two existing brand elements (the device button + sound).</text>
    <text x="0" y="82" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">**Strongest wax seal:** P (KU/NO seal) — old-world European, pairs with Heidelberg edition.</text>
    <text x="0" y="108" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">**Most distinctive overall:** T (soundwave-formed K) — only one nobody else could plausibly own.</text>
    <text x="0" y="134" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">**Edition-specific:** U (burgundy KU/NO) — only on Heidelberg packaging, foil-printed.</text>
    <text x="0" y="170" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#7A736A">My new pick (v3 update): the system uses TWO marks plus an edition stamp:</text>
    <text x="0" y="196" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">  1. **Primary app icon: O (KU/NO with gold rule)** — replaces v1 B (debossed K) — fuller brand reading at favicon size</text>
    <text x="0" y="220" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">  2. **Secondary mark: S (button with sound rings)** — replaces v1 C (recording dot) — adds "broadcasting" signal</text>
    <text x="0" y="244" font-family="system-ui,sans-serif" font-size="14" fill="#1C1A17">  3. **Edition seal: P (wax seal KU/NO)** — for Heidelberg packaging only, foil-gold print</text>
  </g>
</svg>
