<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1700">
  <defs>
    <style>
      :root {
        --paper: #F4EFE6;
        --clean: #FAFAF9;
        --ink: #1C1A17;
        --stone: #7A736A;
        --quiet: #E6DFD2;
        --navy: #253653;
        --mist: #A8C1C7;
        --silver: #B8B8B3;
        --nickel: #A7A19A;
      }
      * { box-sizing: border-box; }
      text {
        font-family: Manrope, Avenir Next, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1C1A17;
      }
      .label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: .16em;
        text-transform: uppercase;
        fill: #7A736A;
      }
      .micro {
        font-size: 13px;
        font-weight: 600;
        fill: #7A736A;
      }
      .body {
        font-size: 21px;
        font-weight: 600;
        fill: #7A736A;
      }
      .title {
        font-size: 58px;
        font-weight: 780;
        letter-spacing: 0;
      }
      .subtitle {
        font-size: 22px;
        font-weight: 650;
        fill: #7A736A;
      }
      .card {
        fill: #E6DFD2;
        stroke: rgba(28,26,23,.06);
        stroke-width: 1;
      }
      .icon-shadow {
        filter: drop-shadow(0 20px 18px rgba(28,26,23,.14));
      }
      .k {
        font-size: 138px;
        font-weight: 820;
        fill: #F4EFE6;
      }
      .k-small {
        font-size: 76px;
        font-weight: 820;
        fill: #F4EFE6;
      }
      .word {
        font-size: 38px;
        font-weight: 760;
        fill: #1C1A17;
      }
      .word-light {
        font-size: 38px;
        font-weight: 760;
        fill: #F4EFE6;
      }
      .banner-title {
        font-size: 50px;
        font-weight: 780;
      }
      .banner-copy {
        font-size: 19px;
        font-weight: 650;
      }
    </style>
    <symbol id="wave-bars" viewBox="0 0 92 96">
      <rect x="0" y="30" width="9" height="36" rx="4.5" fill="currentColor"/>
      <rect x="17" y="18" width="9" height="60" rx="4.5" fill="currentColor"/>
      <rect x="34" y="8" width="9" height="80" rx="4.5" fill="currentColor"/>
      <rect x="51" y="20" width="9" height="56" rx="4.5" fill="currentColor"/>
      <rect x="68" y="34" width="9" height="28" rx="4.5" fill="currentColor"/>
    </symbol>
    <symbol id="mini-wave" viewBox="0 0 72 64">
      <rect x="0" y="23" width="7" height="18" rx="3.5" fill="currentColor"/>
      <rect x="15" y="12" width="7" height="40" rx="3.5" fill="currentColor"/>
      <rect x="30" y="2" width="7" height="60" rx="3.5" fill="currentColor"/>
      <rect x="45" y="14" width="7" height="36" rx="3.5" fill="currentColor"/>
      <rect x="60" y="25" width="7" height="14" rx="3.5" fill="currentColor"/>
    </symbol>
  </defs>

  <rect width="1200" height="1700" fill="#F4EFE6"/>

  <text x="72" y="92" class="label">Kuno Intelligence - visual iteration v3</text>
  <text x="72" y="160" class="title">KI eye-wave direction</text>
  <text x="72" y="204" class="subtitle">No detached dot. K remains first. The I becomes a listening aperture; sound emerges from the I.</text>

  <rect x="60" y="260" width="1080" height="455" rx="26" class="card"/>
  <text x="92" y="315" class="label">App icon candidates</text>

  <!-- Candidate A -->
  <g transform="translate(92 356)">
    <text x="0" y="-18" class="micro">A - literal KI eye</text>
    <rect class="icon-shadow" x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="31" y="119" class="k" style="fill:#F4EFE6">K</text>
    <rect x="112" y="44" width="18" height="80" rx="9" fill="#F4EFE6"/>
    <rect x="117" y="62" width="8" height="44" rx="4" fill="#A7A19A"/>
    <use href="#mini-wave" x="128" y="54" width="34" height="46" color="#B8B8B3"/>
    <text x="0" y="204" class="body">Most explicit KI read.</text>
  </g>

  <!-- Candidate B -->
  <g transform="translate(344 356)">
    <text x="0" y="-18" class="micro">B - recommended eye-wave</text>
    <rect class="icon-shadow" x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="26" y="119" class="k" style="fill:#F4EFE6">K</text>
    <rect x="108" y="48" width="12" height="72" rx="6" fill="#F4EFE6"/>
    <rect x="129" y="61" width="7" height="46" rx="3.5" fill="#F4EFE6"/>
    <rect x="143" y="72" width="7" height="24" rx="3.5" fill="#B8B8B3"/>
    <rect x="156" y="66" width="7" height="36" rx="3.5" fill="#B8B8B3"/>
    <text x="0" y="204" class="body">K first; I opens into voice.</text>
  </g>

  <!-- Candidate C -->
  <g transform="translate(596 356)">
    <text x="0" y="-18" class="micro">C - aperture lock</text>
    <rect class="icon-shadow" x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="25" y="119" class="k" style="fill:#F4EFE6">K</text>
    <rect x="111" y="43" width="23" height="82" rx="11.5" fill="none" stroke="#F4EFE6" stroke-width="10"/>
    <rect x="145" y="57" width="8" height="54" rx="4" fill="#F4EFE6"/>
    <rect x="159" y="71" width="8" height="26" rx="4" fill="#B8B8B3"/>
    <text x="0" y="204" class="body">More ownable, less literal.</text>
  </g>

  <!-- Candidate D -->
  <g transform="translate(848 356)">
    <text x="0" y="-18" class="micro">D - deep navy field</text>
    <rect class="icon-shadow" x="0" y="0" width="168" height="168" rx="38" fill="#253653"/>
    <text x="26" y="119" class="k" style="fill:#F4EFE6">K</text>
    <rect x="108" y="48" width="12" height="72" rx="6" fill="#F4EFE6"/>
    <rect x="129" y="61" width="7" height="46" rx="3.5" fill="#A8C1C7"/>
    <rect x="143" y="72" width="7" height="24" rx="3.5" fill="#B8B8B3"/>
    <rect x="156" y="66" width="7" height="36" rx="3.5" fill="#A8C1C7"/>
    <text x="0" y="204" class="body">Best bridge to LinkedIn.</text>
  </g>

  <text x="92" y="660" class="micro">Recommendation: keep B as the app-icon candidate. Use D for dark-blue marketing fields.</text>

  <rect x="60" y="760" width="1080" height="315" rx="26" fill="#FAFAF9" stroke="rgba(28,26,23,.07)"/>
  <text x="92" y="815" class="label">Motion sketch - I opens, speaks, returns</text>

  <g transform="translate(92 865)">
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="144" height="144" rx="32" fill="#1C1A17"/>
      <text x="25" y="102" class="k-small" style="fill:#F4EFE6">K</text>
      <rect x="98" y="44" width="12" height="58" rx="6" fill="#F4EFE6"/>
      <text x="0" y="176" class="micro">0ms rest KI</text>
    </g>
    <g transform="translate(195 0)">
      <rect x="0" y="0" width="144" height="144" rx="32" fill="#1C1A17"/>
      <text x="25" y="102" class="k-small" style="fill:#F4EFE6">K</text>
      <rect x="96" y="40" width="18" height="66" rx="9" fill="#F4EFE6"/>
      <rect x="102" y="57" width="6" height="32" rx="3" fill="#A7A19A"/>
      <text x="0" y="176" class="micro">240ms aperture</text>
    </g>
    <g transform="translate(390 0)">
      <rect x="0" y="0" width="144" height="144" rx="32" fill="#1C1A17"/>
      <text x="25" y="102" class="k-small" style="fill:#F4EFE6">K</text>
      <rect x="95" y="40" width="13" height="66" rx="6.5" fill="#F4EFE6"/>
      <rect x="119" y="52" width="7" height="42" rx="3.5" fill="#F4EFE6"/>
      <rect x="133" y="64" width="7" height="18" rx="3.5" fill="#B8B8B3"/>
      <text x="0" y="176" class="micro">520ms signal</text>
    </g>
    <g transform="translate(585 0)">
      <rect x="0" y="0" width="144" height="144" rx="32" fill="#1C1A17"/>
      <text x="25" y="102" class="k-small" style="fill:#F4EFE6">K</text>
      <rect x="95" y="38" width="13" height="70" rx="6.5" fill="#F4EFE6"/>
      <rect x="119" y="44" width="7" height="56" rx="3.5" fill="#F4EFE6"/>
      <rect x="133" y="56" width="7" height="32" rx="3.5" fill="#B8B8B3"/>
      <rect x="135" y="64" width="7" height="18" rx="3.5" fill="#B8B8B3"/>
      <text x="0" y="176" class="micro">900ms voice</text>
    </g>
    <g transform="translate(780 0)">
      <rect x="0" y="0" width="144" height="144" rx="32" fill="#1C1A17"/>
      <text x="25" y="102" class="k-small" style="fill:#F4EFE6">K</text>
      <rect x="98" y="44" width="12" height="58" rx="6" fill="#F4EFE6"/>
      <text x="0" y="176" class="micro">1450ms return</text>
    </g>
  </g>

  <rect x="60" y="1120" width="1080" height="250" rx="26" class="card"/>
  <text x="92" y="1175" class="label">Color direction from aluminium device</text>
  <text x="92" y="1218" class="body">Move marketing away from grey-brown gold. Let Deep Navy carry digital seriousness.</text>
  <text x="92" y="1248" class="body">Let Mist and Silver come from the physical object.</text>
  <g transform="translate(92 1260)">
    <g>
      <rect x="0" y="0" width="142" height="72" rx="18" fill="#253653"/>
      <text x="0" y="105" class="micro">Deep Navy</text>
      <text x="0" y="128" class="micro">#253653</text>
    </g>
    <g transform="translate(182 0)">
      <rect x="0" y="0" width="142" height="72" rx="18" fill="#A8C1C7"/>
      <text x="0" y="105" class="micro">Mist Aluminium</text>
      <text x="0" y="128" class="micro">#A8C1C7</text>
    </g>
    <g transform="translate(364 0)">
      <rect x="0" y="0" width="142" height="72" rx="18" fill="#B8B8B3"/>
      <text x="0" y="105" class="micro">Soft Silver</text>
      <text x="0" y="128" class="micro">#B8B8B3</text>
    </g>
    <g transform="translate(546 0)">
      <rect x="0" y="0" width="142" height="72" rx="18" fill="#A7A19A"/>
      <text x="0" y="105" class="micro">Soft Nickel</text>
      <text x="0" y="128" class="micro">#A7A19A</text>
    </g>
    <g transform="translate(728 0)">
      <rect x="0" y="0" width="142" height="72" rx="18" fill="#F4EFE6" stroke="rgba(28,26,23,.12)"/>
      <text x="0" y="105" class="micro">Paper</text>
      <text x="0" y="128" class="micro">#F4EFE6</text>
    </g>
  </g>

  <rect x="60" y="1415" width="1080" height="220" rx="26" fill="#FAFAF9" stroke="rgba(28,26,23,.07)"/>
  <text x="92" y="1470" class="label">LinkedIn banner sketches</text>
  <g transform="translate(92 1508)">
    <rect x="0" y="0" width="315" height="92" rx="18" fill="#253653"/>
    <text x="24" y="40" class="word-light" style="fill:#F4EFE6">Kuno</text>
    <text x="24" y="67" class="banner-copy" style="fill:#F4EFE6">KI im Hier und Jetzt.</text>
    <rect x="240" y="25" width="10" height="42" rx="5" fill="#F4EFE6"/>
    <rect x="260" y="18" width="6" height="56" rx="3" fill="#A8C1C7"/>
    <rect x="274" y="32" width="6" height="28" rx="3" fill="#B8B8B3"/>
    <rect x="288" y="25" width="6" height="42" rx="3" fill="#A8C1C7"/>
  </g>
  <g transform="translate(442 1508)">
    <rect x="0" y="0" width="315" height="92" rx="18" fill="#A8C1C7"/>
    <text x="24" y="40" class="word" style="font-size:31px">Kuno Intelligence</text>
    <text x="24" y="67" class="banner-copy" fill="#7A736A">Designed in Munich</text>
    <rect x="276" y="23" width="7" height="46" rx="3.5" fill="#1C1A17" opacity=".75"/>
    <rect x="290" y="34" width="6" height="24" rx="3" fill="#1C1A17" opacity=".45"/>
    <rect x="303" y="28" width="6" height="36" rx="3" fill="#1C1A17" opacity=".45"/>
  </g>
  <g transform="translate(792 1508)">
    <rect x="0" y="0" width="315" height="92" rx="18" fill="#F4EFE6" stroke="rgba(28,26,23,.12)"/>
    <text x="24" y="40" class="word">KUNO</text>
    <text x="24" y="67" class="banner-copy" fill="#7A736A">AI in the real moment</text>
    <rect x="252" y="23" width="9" height="46" rx="4.5" fill="#1C1A17" opacity=".85"/>
    <rect x="270" y="34" width="7" height="24" rx="3.5" fill="#B8B8B3"/>
    <rect x="286" y="28" width="7" height="36" rx="3.5" fill="#B8B8B3"/>
  </g>
</svg>
