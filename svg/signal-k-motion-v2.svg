<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1320" width="1200" height="1320">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { font-size: 11px; font-weight: 680; letter-spacing: 1.9px; fill: #7A736A; }
      .caption { font-size: 12px; font-weight: 520; fill: #7A736A; }
      .body { font-size: 15px; font-weight: 460; fill: #1C1A17; }
      .title { font-size: 58px; font-weight: 760; letter-spacing: -1px; fill: #1C1A17; }
      .h2 { font-size: 26px; font-weight: 690; letter-spacing: -0.2px; fill: #1C1A17; }
      .word { font-size: 30px; font-weight: 820; letter-spacing: 5px; fill: #1C1A17; }
      .mono { font-size: 12px; font-weight: 620; letter-spacing: 0.5px; fill: #7A736A; }
    </style>

    <symbol id="signal-seed-dark" viewBox="0 0 220 220">
      <rect width="220" height="220" rx="44" fill="#1C1A17"/>
      <rect x="55" y="48" width="24" height="124" rx="12" fill="#F4EFE6"/>
      <rect x="93" y="80" width="18" height="60" rx="9" fill="#D4C39D"/>
      <rect x="127" y="64" width="18" height="92" rx="9" fill="#F4EFE6"/>
      <rect x="161" y="78" width="18" height="64" rx="9" fill="#A7A19A"/>
    </symbol>

    <symbol id="signal-seed-paper" viewBox="0 0 220 220">
      <rect width="220" height="220" rx="44" fill="#F4EFE6" stroke="#1C1A17" stroke-width="4"/>
      <rect x="55" y="48" width="24" height="124" rx="12" fill="#1C1A17"/>
      <rect x="93" y="80" width="18" height="60" rx="9" fill="#C7B06F"/>
      <rect x="127" y="64" width="18" height="92" rx="9" fill="#1C1A17"/>
      <rect x="161" y="78" width="18" height="64" rx="9" fill="#7A736A"/>
    </symbol>

    <symbol id="reveal-k-dark" viewBox="0 0 220 220">
      <rect width="220" height="220" rx="44" fill="#1C1A17"/>
      <rect x="55" y="48" width="24" height="124" rx="12" fill="#F4EFE6"/>
      <rect x="93" y="78" width="18" height="64" rx="9" fill="#D4C39D"/>
      <rect x="127" y="54" width="18" height="46" rx="9" fill="#F4EFE6"/>
      <rect x="127" y="120" width="18" height="46" rx="9" fill="#F4EFE6"/>
      <rect x="161" y="38" width="18" height="34" rx="9" fill="#A7A19A"/>
      <rect x="161" y="148" width="18" height="34" rx="9" fill="#A7A19A"/>
    </symbol>

    <symbol id="button-seed" viewBox="0 0 320 150">
      <rect width="320" height="150" rx="48" fill="#1C1A17"/>
      <rect x="62" y="33" width="18" height="84" rx="9" fill="#F4EFE6"/>
      <rect x="100" y="54" width="14" height="42" rx="7" fill="#D4C39D"/>
      <rect x="132" y="43" width="14" height="64" rx="7" fill="#F4EFE6"/>
      <rect x="164" y="54" width="14" height="42" rx="7" fill="#A7A19A"/>
      <text x="218" y="82" font-size="16" font-weight="680" fill="#F4EFE6">KUNO</text>
    </symbol>
  </defs>

  <rect width="1200" height="1320" fill="#F4EFE6"/>

  <g transform="translate(48,42)">
    <text class="eyebrow" x="0" y="0">KUNO - SIGNAL K MOTION v2</text>
    <text class="caption" x="0" y="28">Simpler App Store mark. Signal first. K appears only as a recording-state motion reveal.</text>
  </g>

  <g transform="translate(48,112)">
    <text class="word" x="0" y="30">KUNO</text>
    <rect x="906" y="0" width="198" height="42" rx="21" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
    <text x="1005" y="27" text-anchor="middle" font-size="14" font-weight="650" fill="#1C1A17">AI in the real moment</text>
  </g>

  <g transform="translate(88,204)">
    <text class="title" x="0" y="0">Signal first.</text>
    <text class="title" x="0" y="68" fill="#7A736A">K in motion.</text>
  </g>

  <g transform="translate(48,330)">
    <rect x="0" y="0" width="1104" height="300" rx="22" fill="#E6DFD2"/>
    <rect x="28" y="28" width="1048" height="244" rx="18" fill="#F4EFE6"/>
    <g transform="translate(72,54)">
      <use href="#signal-seed-dark" width="184" height="184"/>
      <text class="mono" x="0" y="216">IDLE / APP STORE</text>
    </g>
    <g transform="translate(302,120)">
      <path d="M0 0H94" stroke="#7A736A" stroke-width="3" stroke-linecap="round"/>
      <path d="M72 -13L94 0L72 13" fill="none" stroke="#7A736A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(432,54)">
      <use href="#reveal-k-dark" width="184" height="184"/>
      <text class="mono" x="0" y="216">CAPTURE MOTION</text>
    </g>
    <g transform="translate(704,70)">
      <text class="eyebrow" x="0" y="0">SIMPLIFICATION RULE</text>
      <text class="body" x="0" y="42">The static mark is not a K. It is a clean signal cluster.</text>
      <text class="body" x="0" y="72">During recording, the right bars separate into a K-like motion state.</text>
      <text class="caption" x="0" y="110">This keeps the App Store icon calm and lets motion carry the cleverness.</text>
      <use href="#button-seed" x="0" y="124" width="192" height="90"/>
    </g>
  </g>

  <g transform="translate(48,700)">
    <text class="eyebrow" x="0" y="0">STATIC APP ICON CANDIDATES</text>
    <g transform="translate(0,34)">
      <rect x="0" y="0" width="340" height="230" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#signal-seed-dark" x="44" y="28" width="122" height="122"/>
      <text class="h2" x="204" y="74">A</text>
      <text class="body" x="44" y="178">Signal Seed</text>
      <text class="caption" x="44" y="202">Recommended App Store baseline.</text>
    </g>
    <g transform="translate(382,34)">
      <rect x="0" y="0" width="340" height="230" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#signal-seed-paper" x="44" y="28" width="122" height="122"/>
      <text class="h2" x="204" y="74">B</text>
      <text class="body" x="44" y="178">Paper Signal</text>
      <text class="caption" x="44" y="202">Better for packaging and device marks.</text>
    </g>
    <g transform="translate(764,34)">
      <rect x="0" y="0" width="340" height="230" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#button-seed" x="56" y="62" width="200" height="94"/>
      <text class="h2" x="286" y="58">C</text>
      <text class="body" x="44" y="178">Signal Button</text>
      <text class="caption" x="44" y="202">Best for capture controls.</text>
    </g>
  </g>

  <g transform="translate(48,1000)">
    <text class="eyebrow" x="0" y="0">1.6s MOTION REVEAL STORYBOARD</text>
    <g transform="translate(0,34)">
      <rect x="0" y="0" width="204" height="172" rx="18" fill="#E6DFD2"/>
      <rect x="36" y="38" width="22" height="96" rx="11" fill="#1C1A17"/>
      <rect x="78" y="62" width="16" height="48" rx="8" fill="#C7B06F"/>
      <rect x="116" y="50" width="16" height="72" rx="8" fill="#1C1A17"/>
      <rect x="154" y="62" width="16" height="48" rx="8" fill="#7A736A"/>
      <text class="mono" x="28" y="150">0ms - signal</text>
    </g>
    <g transform="translate(225,34)">
      <rect x="0" y="0" width="204" height="172" rx="18" fill="#E6DFD2"/>
      <rect x="36" y="38" width="22" height="96" rx="11" fill="#1C1A17"/>
      <rect x="78" y="58" width="16" height="56" rx="8" fill="#C7B06F"/>
      <rect x="116" y="42" width="16" height="42" rx="8" fill="#1C1A17"/>
      <rect x="116" y="88" width="16" height="42" rx="8" fill="#1C1A17"/>
      <rect x="154" y="54" width="16" height="34" rx="8" fill="#7A736A"/>
      <rect x="154" y="84" width="16" height="34" rx="8" fill="#7A736A"/>
      <text class="mono" x="28" y="150">420ms - split</text>
    </g>
    <g transform="translate(450,34)">
      <rect x="0" y="0" width="204" height="172" rx="18" fill="#E6DFD2"/>
      <rect x="36" y="38" width="22" height="96" rx="11" fill="#1C1A17"/>
      <rect x="78" y="56" width="16" height="60" rx="8" fill="#C7B06F"/>
      <rect x="116" y="34" width="16" height="40" rx="8" fill="#1C1A17"/>
      <rect x="116" y="98" width="16" height="40" rx="8" fill="#1C1A17"/>
      <rect x="154" y="28" width="16" height="30" rx="8" fill="#7A736A"/>
      <rect x="154" y="114" width="16" height="30" rx="8" fill="#7A736A"/>
      <text class="mono" x="28" y="150">800ms - K hint</text>
    </g>
    <g transform="translate(675,34)">
      <rect x="0" y="0" width="204" height="172" rx="18" fill="#E6DFD2"/>
      <rect x="36" y="38" width="22" height="96" rx="11" fill="#1C1A17"/>
      <rect x="78" y="60" width="16" height="52" rx="8" fill="#C7B06F"/>
      <rect x="116" y="44" width="16" height="38" rx="8" fill="#1C1A17"/>
      <rect x="116" y="90" width="16" height="38" rx="8" fill="#1C1A17"/>
      <rect x="154" y="48" width="16" height="30" rx="8" fill="#7A736A"/>
      <rect x="154" y="94" width="16" height="30" rx="8" fill="#7A736A"/>
      <text class="mono" x="28" y="150">1200ms - return</text>
    </g>
    <g transform="translate(900,34)">
      <rect x="0" y="0" width="204" height="172" rx="18" fill="#E6DFD2"/>
      <rect x="36" y="38" width="22" height="96" rx="11" fill="#1C1A17"/>
      <rect x="78" y="62" width="16" height="48" rx="8" fill="#C7B06F"/>
      <rect x="116" y="50" width="16" height="72" rx="8" fill="#1C1A17"/>
      <rect x="154" y="62" width="16" height="48" rx="8" fill="#7A736A"/>
      <text class="mono" x="28" y="150">1600ms - idle</text>
    </g>
  </g>

  <g transform="translate(48,1244)">
    <text class="eyebrow" x="0" y="0">SCALE CHECK</text>
    <g transform="translate(0,30)">
      <rect x="0" y="0" width="1104" height="46" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#signal-seed-dark" x="24" y="7" width="32" height="32"/>
      <use href="#signal-seed-dark" x="84" y="11" width="24" height="24"/>
      <use href="#signal-seed-dark" x="136" y="15" width="16" height="16"/>
      <text class="caption" x="190" y="29">Static mark reads as signal at small sizes; K reveal stays in motion preview: signal-k-motion-v2.html</text>
    </g>
  </g>
</svg>
