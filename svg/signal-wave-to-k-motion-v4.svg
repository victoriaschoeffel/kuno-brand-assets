      <rect x="121" y="51" width="13" height="58" rx="6.5" fill="#A7A19A" opacity=".82"/>
      <text x="0" y="194" fill="#7A736A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="550">290ms breath</text>
    </g>

