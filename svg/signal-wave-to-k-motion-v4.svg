      <text x="0" y="194" fill="#7A736A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="550">0ms idle signal</text>
    </g>

    <g transform="translate(190 0)">
