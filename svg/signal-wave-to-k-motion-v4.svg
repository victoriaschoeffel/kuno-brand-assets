<svg width="1200" height="660" viewBox="0 0 1200 660" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="660" fill="#F4EFE6"/>
  <text x="70" y="70" fill="#1C1A17" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="780" letter-spacing="4">KUNO</text>
  <text x="70" y="106" fill="#7A736A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="650" letter-spacing="2.6">SIGNAL WAVE TO K MOTION V4</text>
  <text x="70" y="140" fill="#7A736A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="500">Resting mark reads as signal. Capture gathers into a contained, right-opening K. No red and no bars outside the black icon field.</text>

  <g transform="translate(70 195)">
    <text x="0" y="-36" fill="#7A736A" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" font-weight="700" letter-spacing="2.4">EDITABLE MOTION STATES</text>

    <g transform="translate(0 0)">
