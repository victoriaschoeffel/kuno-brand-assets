<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1620">
  <defs>
    <style>
      text {
        font-family: Manrope, Avenir Next, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: .16em;
      }
      .caption {
        font-size: 20px;
        font-weight: 700;
      }
      .small {
        font-size: 13px;
        font-weight: 650;
      }
      .title {
        font-size: 56px;
        font-weight: 800;
      }
      .subtitle {
        font-size: 22px;
        font-weight: 650;
      }
      .k-large {
        font-size: 138px;
        font-weight: 800;
      }
      .k-motion {
        font-size: 74px;
        font-weight: 700;
      }
    </style>
  </defs>

  <rect width="1200" height="1620" fill="#F4EFE6"/>

  <text x="72" y="88" class="label" fill="#7A736A">KUNO INTELLIGENCE - APP ICON ITERATION V4</text>
  <text x="72" y="154" class="title" fill="#1C1A17">Simple KI sound-wave mark</text>
  <text x="72" y="198" class="subtitle" fill="#7A736A">Manrope K. The first sound bar reads as I. No eye, no dot, no aperture.</text>

  <rect x="60" y="258" width="1080" height="470" rx="28" fill="#E6DFD2" stroke="#DED6CA"/>
  <text x="92" y="314" class="label" fill="#7A736A">App icon candidates</text>

  <!-- A -->
  <g transform="translate(92 370)">
    <text x="0" y="-18" class="small" fill="#1C1A17">A - plain KI wave</text>
    <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
    <rect x="103" y="43" width="12" height="82" rx="6" fill="#F4EFE6"/>
    <rect x="126" y="58" width="8" height="52" rx="4" fill="#B8B8B3"/>
    <rect x="144" y="70" width="8" height="28" rx="4" fill="#B8B8B3"/>
    <rect x="162" y="62" width="8" height="44" rx="4" fill="#B8B8B3"/>
    <text x="0" y="214" class="caption" fill="#1C1A17">Literal KI, still simple.</text>
  </g>

  <!-- B -->
  <g transform="translate(344 370)">
    <text x="0" y="-18" class="small" fill="#1C1A17">B - recommended</text>
    <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
    <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
    <rect x="130" y="64" width="8" height="40" rx="4" fill="#B8B8B3"/>
    <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    <text x="0" y="214" class="caption" fill="#1C1A17">K first; I becomes voice.</text>
  </g>

  <!-- C -->
  <g transform="translate(596 370)">
    <text x="0" y="-18" class="small" fill="#1C1A17">C - wave-as-I</text>
    <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
    <text x="22" y="118" class="k-large" fill="#F4EFE6">K</text>
    <rect x="107" y="35" width="12" height="98" rx="6" fill="#F4EFE6"/>
    <rect x="130" y="60" width="8" height="48" rx="4" fill="#F4EFE6"/>
    <rect x="148" y="73" width="8" height="22" rx="4" fill="#B8B8B3"/>
    <text x="0" y="214" class="caption" fill="#1C1A17">Most audio-native.</text>
  </g>

  <!-- D -->
  <g transform="translate(848 370)">
    <text x="0" y="-18" class="small" fill="#1C1A17">D - deep navy</text>
    <rect x="0" y="0" width="168" height="168" rx="38" fill="#253653"/>
    <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
    <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
    <rect x="130" y="64" width="8" height="40" rx="4" fill="#A8C1C7"/>
    <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    <text x="0" y="214" class="caption" fill="#1C1A17">Marketing field variant.</text>
  </g>

  <text x="92" y="670" class="small" fill="#1C1A17">Recommendation: B is the cleanest app-icon candidate. C is worth testing if the icon should read more like a normal audio mark.</text>

  <rect x="60" y="780" width="1080" height="300" rx="28" fill="#FAFAF9" stroke="#E4DED3"/>
  <text x="92" y="836" class="label" fill="#7A736A">Motion logic - simple waveform, not a morph puzzle</text>
  <g transform="translate(92 895)">
    <g>
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#1C1A17"/>
      <text x="28" y="91" class="k-motion" fill="#F4EFE6">K</text>
      <rect x="83" y="39" width="10" height="54" rx="5" fill="#F4EFE6"/>
      <text x="0" y="162" class="small" fill="#7A736A">0ms KI rest</text>
    </g>
    <g transform="translate(190 0)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#1C1A17"/>
      <text x="28" y="91" class="k-motion" fill="#F4EFE6">K</text>
      <rect x="83" y="34" width="10" height="64" rx="5" fill="#F4EFE6"/>
      <rect x="104" y="50" width="7" height="32" rx="3.5" fill="#B8B8B3"/>
      <text x="0" y="162" class="small" fill="#7A736A">220ms open</text>
    </g>
    <g transform="translate(380 0)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#1C1A17"/>
      <text x="28" y="91" class="k-motion" fill="#F4EFE6">K</text>
      <rect x="83" y="31" width="10" height="70" rx="5" fill="#F4EFE6"/>
      <rect x="104" y="44" width="7" height="44" rx="3.5" fill="#B8B8B3"/>
      <rect x="120" y="54" width="7" height="24" rx="3.5" fill="#B8B8B3"/>
      <text x="0" y="162" class="small" fill="#7A736A">540ms voice</text>
    </g>
    <g transform="translate(570 0)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#1C1A17"/>
      <text x="28" y="91" class="k-motion" fill="#F4EFE6">K</text>
      <rect x="83" y="37" width="10" height="58" rx="5" fill="#F4EFE6"/>
      <rect x="104" y="53" width="7" height="26" rx="3.5" fill="#B8B8B3"/>
      <text x="0" y="162" class="small" fill="#7A736A">980ms decay</text>
    </g>
    <g transform="translate(760 0)">
      <rect x="0" y="0" width="130" height="130" rx="30" fill="#1C1A17"/>
      <text x="28" y="91" class="k-motion" fill="#F4EFE6">K</text>
      <rect x="83" y="39" width="10" height="54" rx="5" fill="#F4EFE6"/>
      <text x="0" y="162" class="small" fill="#7A736A">1450ms return</text>
    </g>
  </g>

  <rect x="60" y="1130" width="1080" height="330" rx="28" fill="#E6DFD2" stroke="#DED6CA"/>
  <text x="92" y="1186" class="label" fill="#7A736A">Scale check</text>
  <text x="92" y="1232" class="subtitle" fill="#1C1A17">At small sizes, the icon should read as K + voice before it reads as a clever KI monogram.</text>
  <g transform="translate(92 1285)">
    <g transform="scale(.095)">
      <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
      <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
      <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
      <rect x="130" y="64" width="8" height="40" rx="4" fill="#B8B8B3"/>
      <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    </g>
    <text x="0" y="56" class="small" fill="#7A736A">16px</text>
    <g transform="translate(120 0) scale(.19)">
      <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
      <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
      <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
      <rect x="130" y="64" width="8" height="40" rx="4" fill="#B8B8B3"/>
      <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    </g>
    <text x="120" y="76" class="small" fill="#7A736A">32px</text>
    <g transform="translate(270 0) scale(.38)">
      <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
      <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
      <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
      <rect x="130" y="64" width="8" height="40" rx="4" fill="#B8B8B3"/>
      <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    </g>
    <text x="270" y="108" class="small" fill="#7A736A">64px</text>
    <g transform="translate(500 0) scale(.76)">
      <rect x="0" y="0" width="168" height="168" rx="38" fill="#1C1A17"/>
      <text x="24" y="118" class="k-large" fill="#F4EFE6">K</text>
      <rect x="106" y="46" width="11" height="76" rx="5.5" fill="#F4EFE6"/>
      <rect x="130" y="64" width="8" height="40" rx="4" fill="#B8B8B3"/>
      <rect x="148" y="56" width="8" height="56" rx="4" fill="#B8B8B3"/>
    </g>
    <text x="500" y="172" class="small" fill="#7A736A">128px</text>
  </g>
</svg>
