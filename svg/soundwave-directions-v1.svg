<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1260" width="1200" height="1260">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .eyebrow { font-size: 11px; font-weight: 650; letter-spacing: 1.8px; fill: #7A736A; }
      .body { font-size: 15px; font-weight: 450; fill: #1C1A17; }
      .small { font-size: 11px; font-weight: 520; fill: #7A736A; }
      .title { font-size: 58px; font-weight: 720; letter-spacing: -1px; fill: #1C1A17; }
      .h2 { font-size: 28px; font-weight: 650; letter-spacing: -0.2px; fill: #1C1A17; }
      .word { font-size: 30px; font-weight: 800; letter-spacing: 5px; fill: #1C1A17; }
    </style>

    <symbol id="wave-rail-k" viewBox="0 0 160 160">
      <rect width="160" height="160" rx="30" fill="#1C1A17"/>
      <path d="M44 104V56" stroke="#F4EFE6" stroke-width="14" stroke-linecap="round"/>
      <path d="M50 80L88 50" stroke="#F4EFE6" stroke-width="14" stroke-linecap="round"/>
      <path d="M50 80L91 111" stroke="#F4EFE6" stroke-width="14" stroke-linecap="round"/>
      <path d="M112 48C125 61 125 99 112 112" fill="none" stroke="#D4C39D" stroke-width="5" stroke-linecap="round"/>
      <path d="M128 36C148 57 148 103 128 124" fill="none" stroke="#A7A19A" stroke-width="3" stroke-linecap="round"/>
    </symbol>

    <symbol id="wave-bars" viewBox="0 0 160 160">
      <rect width="160" height="160" rx="30" fill="#F4EFE6" stroke="#1C1A17" stroke-width="3"/>
      <line x1="44" y1="60" x2="44" y2="100" stroke="#1C1A17" stroke-width="10" stroke-linecap="round"/>
      <line x1="64" y1="44" x2="64" y2="116" stroke="#1C1A17" stroke-width="10" stroke-linecap="round"/>
      <line x1="84" y1="64" x2="84" y2="96" stroke="#1C1A17" stroke-width="10" stroke-linecap="round"/>
      <line x1="104" y1="36" x2="104" y2="124" stroke="#D4C39D" stroke-width="10" stroke-linecap="round"/>
      <line x1="124" y1="68" x2="124" y2="92" stroke="#A7A19A" stroke-width="10" stroke-linecap="round"/>
    </symbol>

    <symbol id="conversation-wave" viewBox="0 0 160 160">
      <rect width="160" height="160" rx="30" fill="#1C1A17"/>
      <path d="M34 83C44 63 55 63 65 83S86 103 96 83 117 63 127 83" fill="none" stroke="#F4EFE6" stroke-width="8" stroke-linecap="round"/>
      <path d="M34 106H126" stroke="#A7A19A" stroke-width="5" stroke-linecap="round"/>
      <circle cx="80" cy="56" r="9" fill="#D4C39D"/>
    </symbol>

    <symbol id="wave-pill" viewBox="0 0 160 160">
      <rect width="160" height="160" rx="30" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="3"/>
      <rect x="25" y="52" width="110" height="56" rx="28" fill="#1C1A17"/>
      <path d="M42 80C48 68 54 68 60 80S72 92 78 80 90 68 96 80 108 92 114 80" fill="none" stroke="#D4C39D" stroke-width="5" stroke-linecap="round"/>
      <circle cx="123" cy="80" r="8" fill="#F4EFE6"/>
    </symbol>
  </defs>

  <rect width="1200" height="1260" fill="#F4EFE6"/>

  <g transform="translate(48,42)">
    <text class="eyebrow" x="0" y="0">KUNO - SOUNDWAVE DIRECTIONS v1</text>
    <text class="small" x="0" y="28">Fresh sound-wave language plus proposed accent-color refresh. Recording-state red is not used.</text>
  </g>

  <g transform="translate(48,112)">
    <text class="word" x="0" y="30">KUNO</text>
    <rect x="910" y="0" width="194" height="42" rx="21" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
    <text x="1007" y="27" text-anchor="middle" font-size="14" font-weight="650" fill="#1C1A17">KI im Hier und Jetzt</text>
  </g>

  <g transform="translate(126,206)">
    <text class="title" x="0" y="0">The sound wave can be the system.</text>
    <text class="title" x="0" y="68" fill="#7A736A">Not decoration. A product signal.</text>
  </g>

  <!-- Hero product wave strip -->
  <g transform="translate(48,354)">
    <rect x="0" y="0" width="1104" height="246" rx="18" fill="#E6DFD2"/>
    <rect x="28" y="28" width="1048" height="190" rx="16" fill="#F4EFE6"/>
    <g transform="translate(80,52)">
      <rect x="0" y="0" width="94" height="132" rx="24" fill="#1C1A17"/>
      <circle cx="47" cy="40" r="15" fill="#D4C39D"/>
      <path d="M28 91C36 77 44 77 52 91S68 105 76 91" fill="none" stroke="#F4EFE6" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(226,52)">
      <rect x="0" y="0" width="94" height="132" rx="24" fill="#F4EFE6" stroke="#1C1A17" stroke-width="3"/>
      <circle cx="47" cy="40" r="15" fill="#F4EFE6" stroke="#D4C39D" stroke-width="4"/>
      <path d="M28 91C36 77 44 77 52 91S68 105 76 91" fill="none" stroke="#1C1A17" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(372,52)">
      <rect x="0" y="0" width="94" height="132" rx="24" fill="#1C1A17"/>
      <circle cx="47" cy="40" r="15" fill="#F4EFE6"/>
      <path d="M28 91C36 77 44 77 52 91S68 105 76 91" fill="none" stroke="#D4C39D" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(570,58)">
      <text class="eyebrow" x="0" y="0">WAVE AS PRODUCT LANGUAGE</text>
      <text class="body" x="0" y="36">Use one quiet waveform as the bridge between hardware, app, and identity.</text>
      <text class="small" x="0" y="66">No particles. No neon. No pulsing aura. Just a measured signal.</text>
      <rect x="0" y="104" width="392" height="52" rx="18" fill="#1C1A17"/>
      <text x="24" y="32" transform="translate(0 104)" font-size="15" font-weight="620" fill="#F4EFE6">Aufnahme vorbereitet</text>
      <path d="M205 130C215 116 225 116 235 130S255 144 265 130 285 116 295 130 315 144 325 130" fill="none" stroke="#D4C39D" stroke-width="5" stroke-linecap="round"/>
      <circle cx="356" cy="130" r="14" fill="#F4EFE6"/>
    </g>
  </g>

  <!-- Four mark explorations -->
  <g transform="translate(48,662)">
    <text class="eyebrow" x="0" y="0">MARK EXPLORATIONS</text>
    <g transform="translate(0,34)">
      <rect x="0" y="0" width="252" height="238" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#wave-rail-k" x="34" y="26" width="118" height="118"/>
      <text class="h2" x="174" y="74">A</text>
      <text class="body" x="34" y="174">Wave Rail K</text>
      <text class="small" x="34" y="200">Best master icon candidate.</text>
    </g>
    <g transform="translate(284,34)">
      <rect x="0" y="0" width="252" height="238" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#wave-bars" x="34" y="26" width="118" height="118"/>
      <text class="h2" x="174" y="74">B</text>
      <text class="body" x="34" y="174">Signal Bars</text>
      <text class="small" x="34" y="200">Most audio-native.</text>
    </g>
    <g transform="translate(568,34)">
      <rect x="0" y="0" width="252" height="238" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#conversation-wave" x="34" y="26" width="118" height="118"/>
      <text class="h2" x="174" y="74">C</text>
      <text class="body" x="34" y="174">Conversation Wave</text>
      <text class="small" x="34" y="200">Best for product UI.</text>
    </g>
    <g transform="translate(852,34)">
      <rect x="0" y="0" width="252" height="238" rx="18" fill="#F4EFE6" stroke="#E6DFD2" stroke-width="2"/>
      <use href="#wave-pill" x="34" y="26" width="118" height="118"/>
      <text class="h2" x="174" y="74">D</text>
      <text class="body" x="34" y="174">Wave Pill</text>
      <text class="small" x="34" y="200">Best for app controls.</text>
    </g>
  </g>

  <!-- Scale checks -->
  <g transform="translate(48,958)">
    <text class="eyebrow" x="0" y="0">SMALL-SIZE CHECK</text>
    <g transform="translate(0,34)">
      <rect x="0" y="0" width="256" height="78" rx="14" fill="#E6DFD2"/>
      <use href="#wave-rail-k" x="24" y="15" width="48" height="48"/>
      <use href="#wave-rail-k" x="96" y="23" width="32" height="32"/>
      <use href="#wave-rail-k" x="152" y="31" width="16" height="16"/>
      <text class="small" x="196" y="45">A holds.</text>
    </g>
    <g transform="translate(284,34)">
      <rect x="0" y="0" width="256" height="78" rx="14" fill="#E6DFD2"/>
      <use href="#wave-bars" x="24" y="15" width="48" height="48"/>
      <use href="#wave-bars" x="96" y="23" width="32" height="32"/>
      <use href="#wave-bars" x="152" y="31" width="16" height="16"/>
      <text class="small" x="196" y="45">B reads.</text>
    </g>
    <g transform="translate(568,34)">
      <rect x="0" y="0" width="256" height="78" rx="14" fill="#E6DFD2"/>
      <use href="#conversation-wave" x="24" y="15" width="48" height="48"/>
      <use href="#conversation-wave" x="96" y="23" width="32" height="32"/>
      <use href="#conversation-wave" x="152" y="31" width="16" height="16"/>
      <text class="small" x="196" y="45">C softens.</text>
    </g>
    <g transform="translate(852,34)">
      <rect x="0" y="0" width="256" height="78" rx="14" fill="#E6DFD2"/>
      <use href="#wave-pill" x="24" y="15" width="48" height="48"/>
      <use href="#wave-pill" x="96" y="23" width="32" height="32"/>
      <use href="#wave-pill" x="152" y="31" width="16" height="16"/>
      <text class="small" x="196" y="45">D is UI.</text>
    </g>
  </g>

  <!-- Color refresh -->
  <g transform="translate(48,1110)">
    <text class="eyebrow" x="0" y="0">ACCENT COLOR REFRESH - PROPOSED ONLY</text>
    <g transform="translate(0,30)">
      <rect x="0" y="0" width="246" height="74" rx="14" fill="#B8945A"/>
      <text x="20" y="32" font-size="14" font-weight="650" fill="#1C1A17">Warm Gold baseline</text>
      <text x="20" y="54" font-size="12" font-weight="520" fill="#1C1A17">#B8945A - older brass</text>
    </g>
    <g transform="translate(278,30)">
      <rect x="0" y="0" width="246" height="74" rx="14" fill="#D4C39D"/>
      <text x="20" y="32" font-size="14" font-weight="650" fill="#1C1A17">Fresh Champagne</text>
      <text x="20" y="54" font-size="12" font-weight="520" fill="#1C1A17">#D4C39D - recommended</text>
    </g>
    <g transform="translate(556,30)">
      <rect x="0" y="0" width="246" height="74" rx="14" fill="#C7B06F"/>
      <text x="20" y="32" font-size="14" font-weight="650" fill="#1C1A17">Mineral Brass</text>
      <text x="20" y="54" font-size="12" font-weight="520" fill="#1C1A17">#C7B06F - brighter metal</text>
    </g>
    <g transform="translate(834,30)">
      <rect x="0" y="0" width="246" height="74" rx="14" fill="#A7A19A"/>
      <text x="20" y="32" font-size="14" font-weight="650" fill="#1C1A17">Soft Nickel</text>
      <text x="20" y="54" font-size="12" font-weight="520" fill="#1C1A17">#A7A19A - clean hardware</text>
    </g>
  </g>
</svg>
